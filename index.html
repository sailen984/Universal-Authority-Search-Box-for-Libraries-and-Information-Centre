<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Combined Search</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background-color: #f4f4f4;
    }
    header {
        background-color: #333;
        color: #fff;
        padding: 20px;
        text-align: center;
    }
    main {
        max-width: 1200px;
        margin: 20px auto;
        padding: 20px;
        background-color: #fff;
        border-radius: 5px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
    .search-container {
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    form {
        display: flex;
        align-items: center;
        margin-bottom: 20px;
    }
    input[type="text"], select {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        margin-right: 10px;
    }
    button {
        padding: 10px 20px;
        background-color: #007bff;
        color: #fff;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }
    button:hover {
        background-color: #0056b3;
    }
    .language-box {
        display: flex;
        align-items: center;
    }
    select {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 16px;
        margin-left: 10px;
    }
    .search-results-container {
        display: flex;
        justify-content: space-between;
    }
    .search-results {
        flex: 1;
        padding: 20px;
        background-color: #f9f9f9;
        border: 1px solid #ccc;
        border-radius: 5px;
    }
    .search-results h2 {
        margin-top: 0;
    }
    .search-results ul {
        list-style-type: none;
        padding: 0;
    }
    .search-results li {
        margin-bottom: 10px;
    }
    .search-results li a {
        text-decoration: none;
        color: #333;
        font-size: 18px;
    }
</style>
</head>
<body>
<header>
    <h1>Universal Search Window for Authority Indexing</h1>
</header>
<main>
    <div class="search-container">
        <form id="search-form">
            <input type="text" id="search-input" placeholder="Enter your search term...">
            <select id="search-filter">
                <option value="author">Author</option>
                <option value="subject">Subject</option>
                <option value="place">Place</option>
                <option value="keywords">Keywords</option>
                <option value="year">Year</option>
            </select>
            <button type="submit">Search</button>
        </form>
        <div class="language-box">
            <span>Select Language:</span>
            <select id="language-select">
                <option value="en">English</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="it">Italian</option>
                <option value="pt">Portuguese</option>
                <option value="nl">Dutch</option>
                <option value="ru">Russian</option>
                <option value="zh">Chinese</option>
                <option value="ja">Japanese</option>
                <option value="bn">Bengali</option>
                <option value="ar">Arabic</option>
                <option value="hi">Hindi</option>
                <option value="ko">Korean</option>
                <option value="tr">Turkish</option>
                <option value="vi">Vietnamese</option>
            </select>
        </div>
    </div>
    <div class="search-results-container">
        <div id="wikipedia-results" class="search-results">
            <h2>Wikipedia Results</h2>
            <ul id="wikipedia-results-list"></ul>
        </div>
        <div id="dbpedia-results" class="search-results">
            <h2>DBpedia Results</h2>
            <ul id="dbpedia-results-list"></ul>
        </div>
        <div id="library-of-congress-results" class="search-results">
            <h2>Library of Congress Results</h2>
            <ul id="library-of-congress-results-list"></ul>
        </div>
    </div>
</main>

<script>
    document.getElementById("search-form").addEventListener("submit", function(event) {
        event.preventDefault(); // Prevent default form submission

        var query = document.getElementById("search-input").value.trim();
        var language = document.getElementById("language-select").value;
        var filter = document.getElementById("search-filter").value;
        
        if (query !== "") {
            searchWikipedia(query, language, filter);
            searchDBpedia(query, language, filter);
            searchLibraryOfCongress(query, language, filter);
        } else {
            alert("Please enter a search term.");
        }
    });

    function searchWikipedia(query, language, filter) {
        var wikipediaEndpoint = "https://" + language + ".wikipedia.org/w/api.php?action=query&list=search&srsearch=" + encodeURIComponent(query) + "&format=json&origin=*";

        fetch(wikipediaEndpoint)
            .then(response => response.json())
            .then(data => {
                displayWikipediaResults(data.query.search);
            })
            .catch(error => {
                console.error('Error fetching Wikipedia search results:', error);
            });
    }

    function displayWikipediaResults(results) {
        var wikipediaResultsList = document.getElementById("wikipedia-results-list");
        wikipediaResultsList.innerHTML = ""; // Clear previous search results

        results.forEach(function(result) {
            var listItem = document.createElement("li");
            var link = document.createElement("a");
            link.href = "https://en.wikipedia.org/wiki/" + encodeURIComponent(result.title);
            link.textContent = result.title;
            listItem.appendChild(link);
            wikipediaResultsList.appendChild(listItem);
        });
    }

    function searchDBpedia(query, language, filter) {
        var dbpediaEndpoint = "https://dbpedia.org/sparql?default-graph-uri=http%3A%2F%2Fdbpedia.org&query=SELECT+%3Fperson+%3Fname+WHERE+%7B%0D%0A++%3Fperson+rdfs%3Alabel+%3Fname+.%0D%0A++FILTER%28CONTAINS%28LCASE%28%3Fname%29%2C+%22" + encodeURIComponent(query.toLowerCase()) + "%22%29%29%0D%0A%7D%0D%0ALIMIT+10&format=json";

        fetch(dbpediaEndpoint)
            .then(response => response.json())
            .then(data => {
                displayDBpediaResults(data.results.bindings);
            })
            .catch(error => {
                console.error('Error fetching DBpedia search results:', error);
            });
    }

    function displayDBpediaResults(results) {
        var dbpediaResultsList = document.getElementById("dbpedia-results-list");
        dbpediaResultsList.innerHTML = ""; // Clear previous search results

        results.forEach(function(result) {
            var listItem = document.createElement("li");
            var link = document.createElement("a");
            link.href = result.person.value;
            link.textContent = result.name.value;
            listItem.appendChild(link);
            dbpediaResultsList.appendChild(listItem);
        });
    }

    function searchLibraryOfCongress(query, language, filter) {
        var locEndpoint = "https://www.loc.gov/search/?q=" + encodeURIComponent(query) + "&fo=json";

        fetch(locEndpoint)
            .then(response => response.json())
            .then(data => {
                displayLibraryOfCongressResults(data.results);
            })
            .catch(error => {
                console.error('Error fetching Library of Congress search results:', error);
            });
    }

    function displayLibraryOfCongressResults(results) {
        var locResultsList = document.getElementById("library-of-congress-results-list");
        locResultsList.innerHTML = ""; // Clear previous search results

        results.forEach(function(result) {
            var listItem = document.createElement("li");
            var link = document.createElement("a");
            link.href = result.url;
            link.textContent = result.title;
            listItem.appendChild(link);
            locResultsList.appendChild(listItem);
        });
    }
</script>
</body>
</html>
